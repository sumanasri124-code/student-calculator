<!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>
</head>
<body>

<h1>Student Result Calculator</h1>

<form method="POST">

    <label>Student Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Subject 1 Marks:</label><br>
    <input type="number" name="m1" required><br><br>

    <label>Subject 2 Marks:</label><br>
    <input type="number" name="m2" required><br><br>

    <label>Subject 3 Marks:</label><br>
    <input type="number" name="m3" required><br><br>

    <label>Subject 4 Marks:</label><br>
    <input type="number" name="m4" required><br><br>

    <label>Subject 5 Marks:</label><br>
    <input type="number" name="m5" required><br><br>

    <button type="submit">Calculate</button>

</form>

{% if result %}
<hr>
<h2>Result</h2>

<p><b>Name:</b> {{ result.name }}</p>
<p><b>Total:</b> {{ result.total }}</p>
<p><b>Average:</b> {{ result.average }}</p>
<p><b>Grade:</b> {{ result.grade }}</p>
<p><b>Status:</b> {{ result.status }}</p>

{% endif %}

</body>
</html>
